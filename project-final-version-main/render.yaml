databases:
  - name: quiz-db
    databaseName: quiz_db
    user: quiz_user
    plan: free

services:
  - type: web
    name: quiz-backend
    env: docker
    plan: free
    rootDir: backend
    healthCheckPath: /api/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quiz-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      # [C6] Frontend URL for CORS_ALLOWED_ORIGINS
      - key: FRONTEND_URL
        value: "https://quiz-frontend-8n74.onrender.com"
      # [H4] Email settings — set real values for production
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST_USER
        value: ""
      - key: EMAIL_HOST_PASSWORD
        value: ""
      # [C2] Superuser credentials — set via Render dashboard, not hardcoded
      - key: DJANGO_SUPERUSER_USERNAME
        value: "admin"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "admin@example.com"
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true

  - type: web
    name: quiz-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # This handles React Router paths by returning the main index file
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Use explicit public URL so the browser can resolve it
      - key: VITE_API_URL
        value: "https://quiz-backend-qfaw.onrender.com"
