# ──────────────────────────────────────────────────────────────
# Docker Compose — Quiz Application
# ──────────────────────────────────────────────────────────────
# Usage:
#   docker-compose up --build        (build & start all services)
#   docker-compose down              (stop & remove containers)
#   docker-compose down -v           (also remove volumes / DB data)
# ──────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL Database ────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quiz_db}
      POSTGRES_USER: ${POSTGRES_USER:-quiz_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quiz_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quiz_user} -d ${POSTGRES_DB:-quiz_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-quiz_user}:${POSTGRES_PASSWORD:-quiz_password}@db:5432/${POSTGRES_DB:-quiz_db}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-docker-dev-secret-key}
      - DEBUG=${DEBUG:-True}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      # [C2] Superuser credentials from env vars (safe defaults for local dev)
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-admin}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:-admin123}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      # [H4] Email settings (console backend for local dev)
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy
    command: [ "sh", "-c", "python manage.py migrate && python manage.py shell -c \"from django.contrib.auth import get_user_model; User = get_user_model(); u = '${DJANGO_SUPERUSER_USERNAME:-admin}'; User.objects.filter(username=u).exists() or User.objects.create_superuser(u, '${DJANGO_SUPERUSER_EMAIL:-admin@example.com}', '${DJANGO_SUPERUSER_PASSWORD:-admin123}')\" && gunicorn quiz_backend.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120 --log-file -" ]

  # ── React Frontend (nginx) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
